[DEFAULT]
# Configurações padrão do Robot Framework

# Tipo de output
output_format = xml

# Variáveis globais
log_level = INFO
console_width = 100

# Timeout padrão
timeout = 10s

# Tags
include = *

# Diretórios
test_directory = robot/tests
keyword_directory = robot/keywords
resource_directory = robot/resources
result_directory = robot/results

[PATHS]
# Caminhos para os testes e resources
test_path = robot/tests/*.robot
keyword_path = robot/keywords/*.robot
resource_path = robot/resources/*.robot

[DOCUMENTATION]
# Documentação do projeto
project_name = Certificação - QA Test Suite
version = 1.0.0
author = QA Automation Team
description = Suite completa de testes com Robot Framework

[EXECUTION]
# Configurações de execução
parallelization_workers = 1
max_threads = 1
seed = 12345
randomize_tests = false
randomize_suites = false

[REPORTING]
# Configurações de relatórios
generate_report = true
report_title = Certificação - Robot Framework Tests
report_background = light
statistics_title = Test Statistics
