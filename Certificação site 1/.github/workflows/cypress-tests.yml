name: Cypress Tests CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Run Cypress tests
      run: npm run cypress:headless
      env:
        CYPRESS_BASE_URL: ${{ secrets.CYPRESS_BASE_URL || 'https://qualidade.apprbs.com.br' }}
    
    - name: Generate test report
      if: always()
      run: |
        npm install --save-dev cypress-html-report
        npx cypress run --reporter cypress-html-report --reportDir cypress/reports || true
    
    - name: Upload test artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cypress-reports-${{ matrix.node-version }}
        path: cypress/reports/
        retention-days: 30
    
    - name: Upload screenshots
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: cypress-screenshots-${{ matrix.node-version }}
        path: cypress/screenshots/
        retention-days: 7
    
    - name: Upload videos
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cypress-videos-${{ matrix.node-version }}
        path: cypress/videos/
        retention-days: 7

  api-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Run Postman API tests
      run: |
        npm install --save-dev newman
        npx newman run postman/certificacao_tests.json \
          --environment postman/environment.json \
          --reporters cli,json \
          --reporter-json-export postman/results.json || true
    
    - name: Upload API test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: postman-results
        path: postman/results.json
        retention-days: 30

  build-summary:
    runs-on: ubuntu-latest
    needs: [test, api-tests]
    if: always()
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
    
    - name: Create summary
      run: |
        echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Cypress Tests" >> $GITHUB_STEP_SUMMARY
        echo "✓ Executed across Node.js 18.x, 20.x, 22.x" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### API Tests" >> $GITHUB_STEP_SUMMARY
        echo "✓ Postman collection executed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Artifacts:** Screenshots, videos, and reports available in Actions tab" >> $GITHUB_STEP_SUMMARY
